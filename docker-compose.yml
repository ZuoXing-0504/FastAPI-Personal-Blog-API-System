services:
  db:
    image: mysql:8.0
    container_name: fastapi-blog-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: fastapi_blog
      MYSQL_USER: blog_user
      MYSQL_PASSWORD: blog_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi-blog-api
    restart: unless-stopped
    volumes:
      - app_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      DEBUG: "false"
      SQL_ECHO: "false"
      DB_AUTO_CREATE_TABLES: "false"
      DATABASE_URL: mysql+pymysql://blog_user:blog_password@db:3306/fastapi_blog?charset=utf8mb4
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      JWT_SECRET_KEY: change-this-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: 120
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      LOG_LEVEL: INFO
      LOG_DIR: /app/logs
      ENABLE_FILE_LOGGING: "true"
      CORS_ALLOW_ORIGINS: '["*"]'
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
        NEXT_PUBLIC_API_BASE_URL: /backend
        NEXT_PUBLIC_ENABLE_QUERY_DEVTOOLS: "false"
        INTERNAL_API_BASE_URL: http://api:8000/api/v1
    container_name: fastapi-blog-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_API_BASE_URL: /backend
      NEXT_PUBLIC_ENABLE_QUERY_DEVTOOLS: "false"
      INTERNAL_API_BASE_URL: http://api:8000/api/v1
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  app_logs:
